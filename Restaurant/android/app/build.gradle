plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '8'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '4.2.3'
}

android {
    namespace = "com.foodies.restaurant.android"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    kotlinOptions {
        jvmTarget = '17'
    }

    packaging {
        jniLibs {
            useLegacyPackaging = false
            keepDebugSymbols = ['**/*.so']
            excludes += [
                '**/libcardioDecider.so',
                '**/libcardioRecognizer.so',
                '**/libcardioRecognizer_tegra2.so',
                '**/libopencv_core.so',
                '**/libopencv_imgproc.so'
            ]
        }
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt'
            ]
        }
    }

    sourceSets {
        main {
            java.srcDirs = ['src/main/java', 'src/main/kotlin']
        }
    }

    lintOptions {
        disable 'InvalidPackage'
    }

    defaultConfig {
        applicationId = "com.foodies.restaurant.android"
        multiDexEnabled true
        minSdk = 26
        targetSdk = 36
        versionCode = 2
        versionName = "2.0.0"
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

// Global exclusion to prevent SafetyNet from being pulled transitively
configurations.all {
    exclude group: 'com.google.android.gms', module: 'play-services-safetynet'
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation('androidx.multidex:multidex:2.0.1') {
        exclude group: 'com.google.android.play', module: 'core'
    }
    implementation(platform('com.google.firebase:firebase-bom:33.0.0')) {
        exclude group: 'com.google.android.play', module: 'core'
    }
    implementation('com.google.firebase:firebase-crashlytics-ndk')
    implementation('androidx.window:window:1.2.0') {
        exclude group: 'com.google.android.play', module: 'core'
    }
    implementation('androidx.window:window-java:1.2.0') {
        exclude group: 'com.google.android.play', module: 'core'
    }
    implementation('com.google.android.gms:play-services-base:16.0.1') {
        exclude group: 'com.google.android.play', module: 'core'
    }
    implementation('com.google.android.gms:play-services-auth:16.0.1') {
        exclude group: 'com.google.android.play', module: 'core'
    }
    implementation('com.google.android.gms:play-services-identity:16.0.0') {
        exclude group: 'com.google.android.play', module: 'core'
    }
    implementation('com.google.android.gms:play-services-auth-api-phone:16.0.0') {
        exclude group: 'com.google.android.play', module: 'core'
    }
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3'
    implementation 'org.conscrypt:conscrypt-android:2.5.2'
}
