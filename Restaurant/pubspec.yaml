  geolocator: ^12.0.0
  location: ^5.0.3
  place_picker_v2: ^0.0.2
  firebase_app_check: ^0.2.2

dependency_overrides:
  firebase_auth_platform_interface: 7.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
    # - assets/flags/yt
    - assets/audio/
    - assets/audio/mixkit-happy-bells-notification-937.mp3

  fonts:
    - family: Poppinsb
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf

    - family: Poppinsl
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf

    - family: Poppinsm
      fonts:
        - asset: assets/fonts/Poppins-Medium.ttf

    - family: Poppinsr
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

    - family: Poppinssb
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
