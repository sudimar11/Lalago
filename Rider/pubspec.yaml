name: foodie_driver
description: A new Flutter application.

publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 3.2.2+10

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.32.0
  firebase_crashlytics: ^3.5.7
  firebase_auth: ^4.20.0 # or ^4.15.3 if you want to mirror the declared constraint; 4.20.0 resolved in customer
  cloud_firestore: ^4.17.5
  cloud_functions: ^4.7.6
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^18.0.1
  geoflutterfire2: ^2.3.15
  geolocator: ^10.1.1
  geocoding: ^3.0.0
  permission_handler: ^11.1.0
  shared_preferences: ^2.3.2
  image_picker: ^1.0.5
  progress_dialog_null_safe: ^3.0.0
  provider: ^6.1.1
  url_launcher: ^6.1.5
  intl: 0.19.0
  cached_network_image: ^3.3.1
  uuid: ^4.5.1
  video_thumbnail: ^0.5.6
  path_provider: ^2.1.5
  photo_view: ^0.15.0
  video_player: ^2.8.1
  http: ^0.13.1
  smooth_page_indicator: ^1.1.0
  intl_phone_number_input: ^0.7.4
  pin_code_fields: ^8.0.1
  google_maps_flutter: ^2.5.0
  flutter_polyline_points: ^1.0.0
  cupertino_icons: ^1.0.6
  flutter_image_compress: ^2.0.4
  flutter_sound: ^9.2.13
  sign_in_with_apple: ^6.1.2
  google_sign_in: ^6.2.1
  video_compress: ^3.1.2
  location: ^7.0.0
  flutterflow_paginate_firestore: ^1.0.3+1
  mercadopago_sdk: ^1.3.0
  flutterwave_standard: ^1.0.7
  mailer: ^6.0.1
  map_launcher: ^3.1.0
  googleapis_auth: ^1.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.2
  battery_plus: ^6.0.2
  device_info_plus: ^9.1.2
  workmanager: ^0.5.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  fl_chart: ^0.69.0

dependency_overrides:
  google_maps_place_picker_mb: ^3.1.0
  uuid: ^4.0.0
  http: ^1.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/ic_launcher-playstore.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/flags/
    - assets/audio/
    - assets/drivericon.png
    - assets/no_orders.png

  fonts:
    - family: Poppinsb
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf

    - family: Poppinsl
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf

    - family: Poppinsm
      fonts:
        - asset: assets/fonts/Poppins-Medium.ttf

    - family: Poppinsr
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

    - family: Poppinssb
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
