plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

import java.util.Properties

// Load local.properties
def localProps = new Properties()
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { stream ->
        localProps.load(stream)
    }
}

// Flutter version info from local.properties (fall back if missing)
def flutterVersionCode = localProps.getProperty("flutter.versionCode")?.toInteger() ?: 10
def flutterVersionName = localProps.getProperty("flutter.versionName") ?: "3.2.2"

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
   signingConfigs {
    release {
        storeFile file('lalago-release.jks')
        storePassword "071417@Mini"
        keyAlias "lalago_key"
        keyPassword "071417@Mini"
    }
}

    namespace "com.foodies.driver.android"
    compileSdk 35
    ndkVersion "27.0.12077973"

    defaultConfig {
        applicationId "com.foodies.driver.android"
        minSdk 26
        targetSdk 35

        // use the values from local.properties
        versionCode flutterVersionCode
        versionName flutterVersionName

        multiDexEnabled true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    lint {
        disable 'InvalidPackage'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }

    packagingOptions {
        exclude "META-INF/DEPENDENCIES"
        exclude "META-INF/LICENSE"
        exclude "META-INF/LICENSE.txt"
        exclude "META-INF/NOTICE"
        exclude "META-INF/NOTICE.txt"
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "androidx.core:core-ktx:1.6.0"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.9.0"
    implementation "com.squareup.okhttp3:okhttp:4.9.1"
    implementation "com.google.android.gms:play-services-location:19.0.1"
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "io.card:android-sdk:5.+"
    implementation "androidx.window:window:1.0.0"
    implementation "androidx.window:window-java:1.0.0"
    implementation "com.google.android.gms:play-services-mlkit-barcode-scanning:16.1.4"
    implementation platform("com.google.firebase:firebase-bom:33.0.0")
    implementation "com.google.auth:google-auth-library-oauth2-http:1.3.0"

    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.3"
    implementation "com.google.firebase:firebase-messaging:23.0.6"
    implementation "com.google.firebase:firebase-auth"
    implementation "com.google.firebase:firebase-firestore"
}

