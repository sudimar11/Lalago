  assets:
    - assets/images/
    - assets/images/place_holder_offer.png
    - assets/fonts/
    - assets/json file/
    - assets/
    - assets/Varieties/
    - assets/images/rate_yellow.png
    - assets/pis.jpg
    - assets/drivericon.png
    - assets/pisme.jpg
    - assets/images/sadaqa.png
    - assets/images/1-2.jpg
    - assets/slides/1.png
    - assets/slides/2.png
    - assets/slides/3.png
    - assets/slides/4.png
    - assets/lost.png
    - assets/icons/

  fonts:
    - family: Poppinsb
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf

    - family: Poppinsl
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf

    - family: Poppinsm
      fonts:
        - asset: assets/fonts/Poppins-Medium.ttf

    - family: Poppinsr
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf

    - family: Poppinssb
      fonts:
